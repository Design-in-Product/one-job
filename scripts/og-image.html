<!DOCTYPE html>
<!--
  Source for the social media banner (og-image.png, 1200x630).
  Regenerate with a headless browser screenshot at exactly 1200x630, e.g.:

    npx playwright screenshot --viewport-size=1200,630 scripts/og-image.html og-image.png

  Self-contained on purpose: no external fonts or assets, so it renders
  identically anywhere.
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; overflow: hidden; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    background: linear-gradient(135deg, #f35343 0%, #E73C7E 100%);
    position: relative;
    display: flex;
    align-items: center;
  }
  /* Lattice pattern shared with the app's card back */
  .lattice {
    position: absolute; inset: 0;
    background-image:
      repeating-linear-gradient(45deg, rgba(255,255,255,0.07) 0 2px, transparent 2px 26px),
      repeating-linear-gradient(-45deg, rgba(255,255,255,0.07) 0 2px, transparent 2px 26px);
  }
  .copy {
    position: relative;
    padding-left: 90px;
    width: 640px;
  }
  .wordmark {
    font-size: 96px;
    font-weight: 800;
    color: #fff;
    letter-spacing: -2px;
    line-height: 1.05;
    text-shadow: 0 4px 24px rgba(0,0,0,0.18);
  }
  .tagline {
    margin-top: 28px;
    font-size: 34px;
    font-weight: 500;
    color: rgba(255,255,255,0.94);
    line-height: 1.35;
  }
  .url {
    margin-top: 40px;
    display: inline-block;
    font-size: 26px;
    font-weight: 600;
    color: #f35343;
    background: #FFF7ED;
    padding: 12px 28px;
    border-radius: 999px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.18);
  }
  /* Card pair on the right: face-down back + face-up task */
  .cards { position: absolute; right: 70px; top: 50%; transform: translateY(-50%); width: 460px; height: 520px; }
  .card {
    position: absolute;
    width: 300px; height: 420px;
    border-radius: 24px;
    box-shadow: 0 24px 60px rgba(0,0,0,0.30);
  }
  .card.back {
    left: 0; top: 60px;
    transform: rotate(-8deg);
    background: linear-gradient(135deg, #f35343 0%, #E73C7E 100%);
    border: 6px solid #FFF7ED;
  }
  .card.back .inner {
    position: absolute; inset: 10px;
    border-radius: 14px;
    border: 1px solid rgba(255,255,255,0.35);
    background-image:
      repeating-linear-gradient(45deg, rgba(255,255,255,0.12) 0 1.5px, transparent 1.5px 12px),
      repeating-linear-gradient(-45deg, rgba(255,255,255,0.12) 0 1.5px, transparent 1.5px 12px);
    /* Keep the medallion in the corner the face card doesn't cover */
    display: flex; flex-direction: column; align-items: flex-start; justify-content: flex-start;
    padding: 40px 0 0 34px;
  }
  .medallion {
    width: 96px; height: 96px; border-radius: 50%;
    background: #FFF7ED;
    border: 4px solid rgba(255,255,255,0.6);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
  }
  .medallion span {
    font-size: 54px; font-weight: 800;
    background: linear-gradient(135deg, #f35343, #E73C7E);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    padding-bottom: 4px;
  }
  .card.back .label { margin-top: 18px; font-size: 26px; font-weight: 700; color: #fff; }
  .card.face {
    right: 0; top: 10px;
    transform: rotate(6deg);
    background: #fff;
    padding: 30px;
    display: flex; flex-direction: column;
  }
  .card.face h3 { font-size: 28px; font-weight: 700; color: #1f2937; line-height: 1.25; }
  .card.face p { margin-top: 14px; font-size: 18px; color: #6b7280; line-height: 1.5; }
  .card.face .footer {
    margin-top: auto; padding-top: 16px;
    border-top: 1px solid #e5e7eb;
    font-size: 14px; color: #9ca3af; text-align: center;
  }
  .hint {
    display: inline-flex; align-items: center; gap: 8px;
    margin-top: 18px;
    background: #10b981; color: #fff;
    font-size: 16px; font-weight: 700;
    padding: 8px 16px; border-radius: 999px;
    width: fit-content;
  }
</style>
</head>
<body>
  <div class="lattice"></div>
  <div class="copy">
    <div class="wordmark">One Job</div>
    <div class="tagline">See one task. Do one task.<br>Feel accomplished.</div>
    <div class="url">onejob.co</div>
  </div>
  <div class="cards">
    <div class="card back">
      <div class="inner">
        <div class="medallion"><span>1</span></div>
        <div class="label">One Job</div>
      </div>
    </div>
    <div class="card face">
      <h3>Ship the landing page</h3>
      <p>Swipe right when it's done. Everything else can wait its turn.</p>
      <div class="hint">✓ Done</div>
      <div class="footer">Swipe right to complete, left to defer</div>
    </div>
  </div>
</body>
</html>
