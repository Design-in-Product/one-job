<!DOCTYPE html><html><head><style>
* { margin:0; box-sizing:border-box; }
html,body { width:2732px; height:2732px; }
body { display:flex; flex-direction:column; align-items:center; justify-content:center;
  background:linear-gradient(135deg,#f35343 0%,#E73C7E 100%);
  font-family:'Inter',-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; }
.lattice { position:absolute; inset:0; background-image:
  repeating-linear-gradient(45deg,rgba(255,255,255,0.06) 0 4px,transparent 4px 52px),
  repeating-linear-gradient(-45deg,rgba(255,255,255,0.06) 0 4px,transparent 4px 52px); }
.medallion { position:relative; width:420px; height:420px; border-radius:50%; background:#FFF7ED;
  border:16px solid rgba(255,255,255,0.6); display:flex; align-items:center; justify-content:center;
  box-shadow:0 30px 80px rgba(0,0,0,0.25); }
.medallion span { font-size:260px; font-weight:800; line-height:1;
  background:linear-gradient(135deg,#f35343,#E73C7E);
  -webkit-background-clip:text; background-clip:text; color:transparent; padding-bottom:18px; }
h1 { position:relative; margin-top:70px; font-size:140px; font-weight:800; color:#fff;
  letter-spacing:-2px; text-shadow:0 6px 30px rgba(0,0,0,0.18); }
</style></head><body><div class="lattice"></div><div class="medallion"><span>1</span></div><h1>One Job</h1></body></html>
