<!DOCTYPE html><html><head><style>
* { margin:0; box-sizing:border-box; }
html,body { width:432px; height:432px; background:transparent; }
body { display:flex; align-items:center; justify-content:center;
  font-family:'Inter',-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; }
.medallion { width:200px; height:200px; border-radius:50%; background:#FFF7ED;
  border:8px solid rgba(255,255,255,0.85); display:flex; align-items:center;
  justify-content:center; box-shadow:0 10px 26px rgba(0,0,0,0.22); }
.medallion span { font-size:126px; font-weight:800; line-height:1;
  background:linear-gradient(135deg,#f35343,#E73C7E);
  -webkit-background-clip:text; background-clip:text; color:transparent; padding-bottom:8px; }
</style></head><body><div class="medallion"><span>1</span></div></body></html>
