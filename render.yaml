services:
  - type: web
    name: one-job-api
    runtime: python3
    buildCommand: pip install -r requirements.txt
    # Use gunicorn with uvicorn workers for better production performance
    startCommand: gunicorn backend.main:app --workers 2 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --timeout 120
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: one-job-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.11"
    autoDeploy: true
    branch: main  # ⚠️ IMPORTANT: Change this to your branch if not using 'main'
    rootDir: .

databases:
  - name: one-job-db
    databaseName: onejob
    user: onejob_user
    plan: free  # Free for 90 days, then $7/month