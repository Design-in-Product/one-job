name: Android Build

# Manual trigger only — produces an installable debug APK as a workflow
# artifact (sideload it to test the native shell before Play Console setup).
# Release signing can be added later with keystore secrets.
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install dependencies
        run: npm ci

      - name: Build native web bundle
        run: npm run build:native

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: one-job-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
