name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Set the VITE_API_URL repository variable (Settings → Secrets and
      # variables → Actions → Variables) once the backend is deployed;
      # while unset, the app ships in demo mode.
      - name: Build
        run: npm run build
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}

      - name: Create deployment directory
        run: |
          mkdir -p deploy
          cp landing-page.html deploy/index.html
          cp demo.html deploy/
          cp -r app deploy/
          cp public/favicon.svg deploy/ 2>/dev/null || true
          cp og-image.png deploy/ 2>/dev/null || true
          cp favicon-onejob.svg deploy/ 2>/dev/null || true
          cp logo-onejob.svg deploy/ 2>/dev/null || true
          cp one-job.png deploy/ 2>/dev/null || true
          cp one-job.svg deploy/ 2>/dev/null || true
          cp robots.txt deploy/ 2>/dev/null || true
          cp placeholder.svg deploy/ 2>/dev/null || true
          cp CNAME deploy/ 2>/dev/null || true

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './deploy'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4