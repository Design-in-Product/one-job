name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      bundle: ${{ steps.hash.outputs.bundle }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Set the VITE_API_URL repository variable (Settings → Secrets and
      # variables → Actions → Variables) once the backend is deployed;
      # while unset, the app ships in demo mode.
      - name: Build
        run: npm run build
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}

      - name: Create deployment directory
        run: |
          mkdir -p deploy
          cp landing-page.html deploy/index.html
          cp roadmap.html deploy/
          cp philosophy.html deploy/
          cp demo.html deploy/
          cp privacy.html deploy/ 2>/dev/null || true
          cp -r site deploy/
          cp -r app deploy/
          cp public/favicon.svg deploy/ 2>/dev/null || true
          cp og-image.png deploy/ 2>/dev/null || true
          cp favicon-onejob.svg deploy/ 2>/dev/null || true
          cp logo-onejob.svg deploy/ 2>/dev/null || true
          cp one-job.png deploy/ 2>/dev/null || true
          cp one-job.svg deploy/ 2>/dev/null || true
          cp robots.txt deploy/ 2>/dev/null || true
          cp placeholder.svg deploy/ 2>/dev/null || true
          cp CNAME deploy/ 2>/dev/null || true

      - name: Record bundle hash for post-deploy verification
        id: hash
        run: echo "bundle=$(grep -o 'index-[A-Za-z0-9_-]*\.js' deploy/app/index.html | head -1)" >> "$GITHUB_OUTPUT"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './deploy'

  deploy:
    # Never deploy from pull_request builds — push to main only
    if: github.event_name == 'push'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # Green here means the LIVE site serves the freshly built bundle —
  # "deploy succeeded" is observed, never assumed (lesson of 2026-07-04,
  # when builds failed silently for a day and nobody's phone updated).
  verify:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: [build, deploy]
    steps:
      - name: Confirm live site serves the new bundle
        run: |
          expected="${{ needs.build.outputs.bundle }}"
          if [ -z "$expected" ]; then
            echo "No bundle hash recorded — failing loudly" >&2
            exit 1
          fi
          echo "Expecting live site to serve: $expected"
          for i in $(seq 1 20); do
            live=$(curl -fsSL --max-time 20 https://onejob.co/app/ | grep -o 'index-[A-Za-z0-9_-]*\.js' | head -1 || true)
            echo "Attempt $i: live serves ${live:-<fetch failed>}"
            if [ "$live" = "$expected" ]; then
              echo "✓ Live site is current."
              exit 0
            fi
            sleep 15
          done
          echo "Live site never served the expected bundle within 5 minutes" >&2
          exit 1
