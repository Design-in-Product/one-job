name: Android Release (signed AAB)

# Manual trigger. Requires repository secrets (see
# scripts/make-android-keystore.sh):
#   ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS
# Produces a Play-Console-ready .aab as a workflow artifact.
on:
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check signing secrets
        env:
          KS: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KS" ]; then
            echo "::error::ANDROID_KEYSTORE_BASE64 secret is not set. Run scripts/make-android-keystore.sh and add the secrets first."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install dependencies
        run: npm ci

      - name: Build native web bundle
        run: npm run build:native

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Decode keystore
        env:
          KS: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$KS" | base64 -d > android/onejob-upload.keystore

      - name: Build signed AAB
        working-directory: android
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=$PWD/onejob-upload.keystore \
            -Pandroid.injected.signing.store.password="$KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEYSTORE_PASSWORD"

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: one-job-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30
